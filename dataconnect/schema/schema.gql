# GraphQL Schema for AI Pulse (Firebase Data Connect)

type NewsArticle @table {
  id: UUID! @default(expr: "uuid_generate_v4()")
  title: String!
  headlineClaim: String! 
  contentSummary: String!
  rawContent: String!
  url: String! @unique
  source: String!
  category: CategoryType!
  hypeScore: Int!
  hypeLabel: String!
  publishedAt: Timestamp! @default(expr: "now()")
  # Vector embedding for semantic search / cross-comparison
  embedding: Vector! @col(size: 768)
}

enum CategoryType {
  LLM
  ROBOTICS
  AGENTS
  HARDWARE
}
